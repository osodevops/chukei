name: Publish Docker

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag to publish, normally the Git release tag"
        required: true
        default: "v0.2.2"
      source_ref:
        description: "Git ref to build from"
        required: true
        default: "v0.2.2"
      push_latest:
        description: "Also push latest and vMAJOR.MINOR tags"
        required: true
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: osodevops/chukei
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.source_ref }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Prepare tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          MINOR="v${VERSION%.*}"

          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${TAG}"
            if [[ "${{ inputs.push_latest }}" == "true" ]]; then
              echo "${IMAGE_NAME}:${MINOR}"
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build local smoke image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:smoke
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm "${IMAGE_NAME}:smoke" --version
          docker run --rm "${IMAGE_NAME}:smoke" --help

      - name: Build and push multi-arch image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
