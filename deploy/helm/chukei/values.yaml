replicaCount: 1

image:
  repository: osodevops/chukei
  tag: v0.2.3
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  proxyPort: 8443
  observabilityPort: 9090

resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}

terminationGracePeriodSeconds: 30

config:
  listen:
    bind: "0.0.0.0:8443"
  upstream:
    snowflake:
      account: "abc12345.us-east-1"
  storage:
    backend: filesystem
    path: "/var/lib/chukei"
  coalesce:
    enabled: true
    scope: session
  savings:
    enabled: true
    db_path: "/var/lib/chukei/savings.db"
    usd_per_credit: 3.0
    conservative_factor: 0.7
    default_warehouse_size: M
  plugins:
    cache:
      enabled: true
      default_ttl_secs: 900
      determinism_gate: strict
      blame_sample_rate: 0.01
      max_entries: 10000
      persist_path: "/var/lib/chukei/cache"
    router:
      enabled: false
      duckdb:
        enabled: false
        replicas: []
    rewrite:
      enabled: true
      rules:
        - all
      experimental:
        llm_rewrite: false
    suspend:
      enabled: true
      mode: suggest-only
      role: CHUKEI_SUSPENDER
      sweep_interval_secs: 30
    attribute:
      enabled: true
      auto_query_tag: true
      dbt_metadata_parser: true
      sources:
        - hint_comment
        - application_name
        - dbt_meta
  observability:
    prometheus:
      enabled: true
      port: 9090
  evidence:
    enabled: true
    signing:
      enabled: false
    retention_days: 2555

existingConfigSecret: ""
configSecretKey: chukei.yaml

tls:
  existingSecret: ""
  certKey: tls.crt
  privateKeyKey: tls.key

persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

healthcheck:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
  readinessPeriodSeconds: 5
