apiVersion: v1
kind: Service
metadata:
  name: {{ include "chukei.fullname" . }}
  labels:
    {{- include "chukei.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "chukei.selectorLabels" . | nindent 4 }}
  ports:
    - name: proxy
      port: {{ .Values.service.proxyPort }}
      targetPort: proxy
      protocol: TCP
    - name: observability
      port: {{ .Values.service.observabilityPort }}
      targetPort: observability
      protocol: TCP
